    <title>OrganicWala</title>
    <style>
      .custom-btn {
        width: 130px; height: 40px; outline: none;
        color: #fff; background: transparent;
        border-radius: 5px; padding: 10px 25px;
        font-family: 'Lato', sans-serif; font-weight: 500;
        cursor: pointer; transition: all 0.3s ease;  
        position: relative; display: inline-block;
        box-shadow: inset 2px 2px 2px 0px rgba(255,255,255,.5),
          7px 7px 20px 0px rgba(0,0,0,.1),
          4px 4px 5px 0px rgba(0,0,0,.1);
        }

      .btn-1 {
        background: rgb(6,14,131);
        background: linear-gradient(0deg, rgba(6,14,131,1) 0%, rgba(12,25,180,1) 100%);
        border: none;
      }

      .btn-1:hover {
        background: rgb(0,3,255);
        background: linear-gradient(0deg, rgb(0, 17, 255) 0%, rgba(2,126,251,1) 100%);
      }

      body 
      {
        margin: 0; /* Remove default body margin */
        padding: 0; /* Remove default body padding */

        background-color: #B7E5B4;
        width: 100%;

      .details_box
      {

        height: auto;
        background-color: #FFB996;
        margin-right: auto;
        margin-left: auto;
        border-radius: 10%;
        padding: 3%;
        margin-top: 40px;
      }
      #logo
      {
        position:relative;
        top: 20px;
        width: 25%;

      select

        border-radius: 2%;
